# Native (Tauri) builds — runs alongside the Electron build.yml during the
# migration; the Electron workflow keeps feeding the rolling "latest" release
# until the Tauri build reaches feature parity (master output window lands
# with the native renderer), then this one takes over the release job.
name: Tauri Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: System deps (Tauri webview, cpal audio, midir udev)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libasound2-dev libudev-dev patchelf

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build app
        run: npx tauri build --target ${{ matrix.target }}
        # Unsigned builds, as with the Electron pipeline. When signing lands:
        # macOS: APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY + notarytool secrets
        # Windows: AZURE_TRUSTED_SIGNING or PFX secrets

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
