name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # Raspberry Pi / arm64 — native build on a GitHub arm64 runner (no
          # cross-compilation; the apt step + bundle paths are arch-agnostic).
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: System deps (Tauri webview, cpal audio, midir udev)
        if: runner.os == 'Linux'
        run: |
          # The hosted runner's apt points at Azure mirrors (via the mirrorlist
          # in /etc/apt/apt-mirrors.txt) plus a Microsoft prod repo we don't
          # use. They drift out of sync — serving a libgstreamer1.0-dev whose
          # libunwind-dev dependency can't be satisfied ("held broken
          # packages") — so drop the Microsoft repo and rewrite the Azure mirror
          # to the canonical Ubuntu archives. Deleting the sources.list.d entries
          # alone misses the mirror that's actually serving packages.
          sudo find /etc/apt/sources.list.d -type f \
            \( -iname '*microsoft*' -o -iname '*azure*' \) -delete
          azure_files=$(grep -rlE 'azure\.(archive|ports)\.ubuntu\.com' /etc/apt 2>/dev/null || true)
          if [ -n "$azure_files" ]; then
            sudo sed -i \
              -e 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' \
              -e 's|azure.ports.ubuntu.com|ports.ubuntu.com|g' \
              $azure_files
          fi
          sudo apt-get update
          sudo apt-get install -y --allow-downgrades libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libasound2-dev libudev-dev patchelf libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build app
        env:
          # Updater signing (tauri-plugin-updater). Without these the build
          # still succeeds but produces no .sig files, and the updater can't
          # verify downloads. Set both as repo secrets (private key + its
          # password from `tauri signer generate`).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}
        # Still OS-unsigned. When OS signing lands:
        # macOS: APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY + notarytool secrets
        # Windows: AZURE_TRUSTED_SIGNING or PFX secrets

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig
          if-no-files-found: error

  release:
    needs: build
    # Publish whatever platforms built — a red Windows/Linux leg must not
    # hold the macOS build hostage (it errors only if NO leg produced assets).
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          # Each leg's artifact lands in builds/<artifact-name>/ (no merge), so
          # the x86_64 and arm64 Linux bundles never collide on rename.
          path: builds

      - name: Rename bundles to the stable names the site links to
        run: |
          mkdir -p assets
          find builds/macos-latest    -type f -name '*.dmg'         -exec cp {} assets/Vizzy-mac.dmg \;
          # macOS updater artifact (the updater installs the .app.tar.gz, not the .dmg).
          find builds/macos-latest    -type f -name '*.app.tar.gz'  -exec cp {} assets/Vizzy-mac.app.tar.gz \;
          find builds/windows-latest  -type f -name '*.exe'         -exec cp {} assets/Vizzy-win.exe \;
          find builds/ubuntu-22.04     -type f -name '*.AppImage'    -exec cp {} assets/Vizzy-linux.AppImage \;
          find builds/ubuntu-22.04     -type f -name '*.deb'         -exec cp {} assets/Vizzy-linux.deb \;
          find builds/ubuntu-22.04-arm -type f -name '*.AppImage'    -exec cp {} assets/Vizzy-linux-arm64.AppImage \;
          find builds/ubuntu-22.04-arm -type f -name '*.deb'         -exec cp {} assets/Vizzy-linux-arm64.deb \;
          ls -l assets

      - name: Generate updater manifest (latest.json)
        run: |
          base=https://github.com/Driptap/vizzy/releases/latest/download
          version=$(jq -r .version src-tauri/tauri.conf.json)
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # The signature stored in latest.json is the verbatim content of each
          # bundle's .sig file (produced by createUpdaterArtifacts + the signing
          # key). Missing legs are skipped so a partial build still publishes.
          sig() { local f; f=$(find "$1" -type f -name "$2" | head -1); [ -n "$f" ] && cat "$f" || true; }
          mac_sig=$(sig builds/macos-latest    '*.app.tar.gz.sig')
          win_sig=$(sig builds/windows-latest  '*-setup.exe.sig')
          lx64_sig=$(sig builds/ubuntu-22.04     '*.AppImage.sig')
          larm_sig=$(sig builds/ubuntu-22.04-arm '*.AppImage.sig')

          platforms='{}'
          add() { # key url sig
            [ -z "$3" ] && return 0
            platforms=$(echo "$platforms" | jq --arg k "$1" --arg u "$2" --arg s "$3" \
              '. + {($k): {url: $u, signature: $s}}')
          }
          add darwin-aarch64 "$base/Vizzy-mac.app.tar.gz"        "$mac_sig"
          add windows-x86_64 "$base/Vizzy-win.exe"               "$win_sig"
          add linux-x86_64   "$base/Vizzy-linux.AppImage"        "$lx64_sig"
          add linux-aarch64  "$base/Vizzy-linux-arm64.AppImage"  "$larm_sig"

          jq -n --arg v "$version" --arg d "$pub_date" \
            --arg notes "Automated build of ${{ github.sha }}." \
            --argjson platforms "$platforms" \
            '{version: $v, notes: $notes, pub_date: $d, platforms: $platforms}' \
            > assets/latest.json
          cat assets/latest.json

      - name: Update rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest assets/* \
            --title "Latest build" \
            --notes "Automated build of ${{ github.sha }}. Unsigned binaries — macOS will say Vizzy 'is damaged and can't be opened'. It isn't: move Vizzy.app to Applications, then run: xattr -dr com.apple.quarantine /Applications/Vizzy.app" \
            --latest
