name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: System deps (Tauri webview, cpal audio, midir udev)
        if: runner.os == 'Linux'
        run: |
          # The hosted runner ships Microsoft/Azure apt repos we don't use;
          # they intermittently 403 / lose signing and fail `apt-get update`.
          sudo find /etc/apt/sources.list.d -type f \
            \( -iname '*microsoft*' -o -iname '*azure*' \) -delete
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libasound2-dev libudev-dev patchelf

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build app
        run: npx tauri build --target ${{ matrix.target }}
        # Unsigned builds. When signing lands:
        # macOS: APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY + notarytool secrets
        # Windows: AZURE_TRUSTED_SIGNING or PFX secrets

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: build
    # Publish whatever platforms built — a red Windows/Linux leg must not
    # hold the macOS build hostage (it errors only if NO leg produced assets).
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: builds
          merge-multiple: true

      - name: Rename bundles to the stable names the site links to
        run: |
          mkdir -p assets
          find builds -type f -name '*.dmg'      -exec cp {} assets/Vizzy-mac.dmg \;
          find builds -type f -name '*.exe'      -exec cp {} assets/Vizzy-win.exe \;
          find builds -type f -name '*.AppImage' -exec cp {} assets/Vizzy-linux.AppImage \;
          find builds -type f -name '*.deb'      -exec cp {} assets/Vizzy-linux.deb \;
          ls -l assets

      - name: Update rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest assets/* \
            --title "Latest build" \
            --notes "Automated build of ${{ github.sha }}. Unsigned binaries — macOS will say Vizzy 'is damaged and can't be opened'. It isn't: move Vizzy.app to Applications, then run: xattr -dr com.apple.quarantine /Applications/Vizzy.app" \
            --latest
