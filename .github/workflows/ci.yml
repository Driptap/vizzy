name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: System deps (Tauri webview, cpal audio, midir udev)
        run: |
          # The hosted runner ships Microsoft/Azure apt repos we don't use;
          # they intermittently 403 / lose signing and fail `apt-get update`.
          sudo find /etc/apt/sources.list.d -type f \
            \( -iname '*microsoft*' -o -iname '*azure*' \) -delete
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libasound2-dev libudev-dev

      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - run: cargo test --manifest-path src-tauri/Cargo.toml
